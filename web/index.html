<!DOCTYPE html>
<html lang="zh-CN" class="scroll-smooth">
<head>
<meta charset="UTF-8">

<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8C%B7%3C/text%3E%3C/svg%3E">
<link rel="preload" as="image" href="./images/idols/wonyoung-white-sailor.jpg">
<link rel="preload" as="image" href="./images/idols/karina-black-beret-white-hair.jpg">

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { darkMode: 'class' };
  (function () {
    const stored = localStorage.getItem('k-idol-preference-theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const isDark = stored ? stored === 'dark' : prefersDark;
    if (isDark) document.documentElement.classList.add('dark');
  })();
</script>

<style>
  :root { --safe-top: env(safe-area-inset-top); --safe-bottom: env(safe-area-inset-bottom); }
  body {
    -webkit-tap-highlight-color: transparent;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  }
  .idol-card { transition: transform .14s ease, box-shadow .14s ease, border-color .14s ease; }
  .idol-card:hover { transform: translateY(-2px); }
  .hero-bg {
    position: relative;
    isolation: isolate;
    overflow: hidden;
    display: flex;
    align-items: center;
    min-height: 76vh;
    background-color: #29151e;
    background-image:
      linear-gradient(90deg, rgb(35 17 26 / .96) 0%, rgb(35 17 26 / .82) 34%, rgb(35 17 26 / .44) 62%, rgb(35 17 26 / .18) 100%),
      linear-gradient(135deg, #4b1728 0%, #2b2532 48%, #123a3b 100%);
  }
  .hero-bg::after {
    content: "";
    position: absolute;
    inset: 0;
    z-index: -1;
    background:
      linear-gradient(115deg, rgb(255 255 255 / .12) 0%, rgb(255 255 255 / 0) 34%),
      linear-gradient(0deg, rgb(255 228 230 / .16) 0%, rgb(255 228 230 / 0) 42%);
  }
  .dark .hero-bg {
    background-color: #171015;
    background-image:
      linear-gradient(90deg, rgb(18 11 15 / .97) 0%, rgb(18 11 15 / .84) 36%, rgb(18 11 15 / .48) 64%, rgb(18 11 15 / .22) 100%),
      linear-gradient(135deg, #341421 0%, #201c28 52%, #0f3032 100%);
  }
  .hero-content {
    position: relative;
    z-index: 2;
    max-width: 34rem;
    text-shadow: 0 2px 18px rgb(0 0 0 / .28);
  }
  .hero-visual {
    position: absolute;
    inset: 0 0 0 45%;
    z-index: 1;
    display: flex;
    align-items: flex-end;
    justify-content: flex-end;
    gap: clamp(12px, 1.5vw, 24px);
    padding-right: clamp(12px, 3vw, 44px);
    pointer-events: none;
  }
  .hero-idol {
    position: relative;
    flex: 0 0 auto;
    height: clamp(330px, 36vw, 560px);
    width: auto;
    max-width: none;
    object-fit: contain;
    object-position: bottom center;
    filter: drop-shadow(0 24px 34px rgb(0 0 0 / .34));
    -webkit-mask-image: linear-gradient(to bottom, black 82%, transparent 100%);
    mask-image: linear-gradient(to bottom, black 82%, transparent 100%);
  }
  .hero-idol-wonyoung {
    order: 1;
    -webkit-mask-image: none;
    mask-image: none;
  }
  .hero-idol-karina {
    order: 2;
  }
  .hero-copy-break {
    display: block;
  }
  @media (max-width: 900px) {
    .hero-bg {
      align-items: flex-start;
      background-image:
        linear-gradient(180deg, rgb(35 17 26 / .96) 0%, rgb(35 17 26 / .82) 42%, rgb(35 17 26 / .36) 100%),
        linear-gradient(135deg, #4b1728 0%, #2b2532 50%, #123a3b 100%);
    }
    .hero-inner {
      padding-top: 3rem;
      padding-bottom: 21.5rem;
    }
    .hero-actions {
      margin-top: 1.5rem;
      padding-top: 0;
    }
    .hero-visual {
      inset: auto 0 0 0;
      height: 19rem;
      padding-right: clamp(8px, 2vw, 20px);
      gap: 8px;
    }
    .hero-idol {
      height: min(18.5rem, 50vw);
    }
    .hero-idol-wonyoung {
      opacity: .62;
    }
    .hero-idol-karina {
      opacity: .62;
    }
  }
  @media (max-width: 520px) {
    .hero-bg {
      min-height: 40.5rem;
    }
    .hero-inner {
      padding-top: 1.75rem;
      padding-bottom: 13.75rem;
    }
    .hero-content {
      display: flex;
      flex-direction: column;
    }
    .hero-content h2 {
      order: 2;
    }
    .hero-content p {
      order: 4;
      max-width: 19rem;
      margin-top: 1rem;
      font-size: .95rem;
      line-height: 1.65;
    }
    .hero-copy-break {
      display: none;
    }
    .hero-actions {
      order: 3;
      margin-top: 1rem;
      gap: .6rem;
    }
    .hero-actions a {
      padding: .65rem .9rem;
    }
    .hero-visual {
      justify-content: center;
      height: 13rem;
      padding-right: 0;
      gap: 8px;
      transform: translateX(-2.25rem);
    }
    .hero-idol {
      height: 12.6rem;
    }
    .hero-idol-wonyoung {
      opacity: 1;
    }
    .hero-idol-karina {
      opacity: .68;
    }
  }
</style>
</head>

    <div class="min-w-0">
      <p class="text-[11px] font-medium uppercase text-rose-500 dark:text-rose-300">Presented by XJY</p>
      <h1 class="text-base sm:text-lg font-semibold truncate">你更pick谁</h1>
      <p class="text-xs text-zinc-500 dark:text-rose-100/70 truncate">测你的大女主剧本</p>
    </div>
    <div class="flex items-center gap-2 shrink-0">
      <a href="./quiz.html" class="px-3 py-2 rounded-lg text-sm bg-rose-600 hover:bg-rose-700 text-white transition">开始测试</a>
      <button id="theme-toggle" aria-label="切换深色模式" class="p-2 rounded-lg bg-rose-100 hover:bg-rose-200 dark:bg-rose-950/50 dark:hover:bg-rose-900/70 transition">
        <svg class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
        <svg class="w-5 h-5 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
      </button>
    </div>
  </div>
</header>

<main class="pb-16" style="padding-bottom: calc(4rem + var(--safe-bottom));">
  <section class="hero-bg">
    <div class="hero-visual" aria-hidden="true">
      <img src="./images/idols/wonyoung-white-sailor.jpg" alt="" class="hero-idol hero-idol-wonyoung" decoding="async" fetchpriority="high">
      <img src="./images/idols/karina-black-beret-white-hair.jpg" alt="" class="hero-idol hero-idol-karina" decoding="async" fetchpriority="high">
    </div>
    <div class="hero-inner max-w-6xl mx-auto px-4 py-14 sm:py-20 w-full">
      <div class="hero-content text-white">
        <div class="flex flex-wrap gap-2 text-xs">
          <span class="px-2.5 py-1 rounded-full bg-white/18 border border-white/25">24 个大女主剧本</span>
          <span class="px-2.5 py-1 rounded-full bg-white/18 border border-white/25">12 个衡量维度</span>
          <span class="px-2.5 py-1 rounded-full bg-white/18 border border-white/25">72 张idol美图</span>
        </div>
        <h2 class="mt-5 text-3xl sm:text-5xl lg:text-6xl font-bold tracking-tight leading-tight">张元英or柳智敏<br>你更pick谁</h2>
        <p class="mt-5 max-w-lg text-base sm:text-lg leading-relaxed text-white/86">从甜感、冷感、舞台爆发、声线类型、镜头表现<br class="hero-copy-break">和亲近感里，找出你最欣赏的那一种漂亮和能量。</p>
        <div class="hero-actions mt-10 sm:mt-12 flex flex-wrap gap-3 pt-2">
          <a href="./quiz.html" class="px-5 py-3 rounded-lg bg-rose-600 hover:bg-rose-700 text-white font-medium transition">现在开始</a>
          <a href="#idols" class="px-5 py-3 rounded-lg bg-white/16 hover:bg-white/24 border border-white/25 text-white font-medium transition">查看结果池</a>
        </div>
      </div>
    </div>
  </section>

  <section class="max-w-6xl mx-auto px-4 mt-10" id="dimensions">
    <h3 class="text-lg font-semibold">测试核心区分</h3>
    <div class="mt-4 grid grid-cols-2 sm:grid-cols-2 xl:grid-cols-6 gap-2 sm:gap-3">
      <div class="rounded-lg border border-rose-100 dark:border-rose-900/30 bg-white dark:bg-[#211a1f] p-3 sm:p-4">
        <p class="text-[11px] sm:text-xs uppercase tracking-wide text-rose-500 dark:text-rose-300">视觉偏好</p>
        <p class="mt-1.5 sm:mt-2 text-xs sm:text-sm text-zinc-600 dark:text-rose-100/72">甜感亮度、冷感气场</p>

        <p class="mt-1.5 sm:mt-2 text-xs sm:text-sm text-zinc-600 dark:text-rose-100/72">舞台爆发、舞蹈张力</p>
      </div>
      <div class="rounded-lg border border-rose-100 dark:border-rose-900/30 bg-white dark:bg-[#211a1f] p-3 sm:p-4">
        <p class="text-[11px] sm:text-xs uppercase tracking-wide text-teal-600 dark:text-teal-300">音乐取向</p>
        <p class="mt-1.5 sm:mt-2 text-xs sm:text-sm text-zinc-600 dark:text-rose-100/72">声线质感、作品叙事</p>
      </div>
      <div class="rounded-lg border border-rose-100 dark:border-rose-900/30 bg-white dark:bg-[#211a1f] p-3 sm:p-4">

        <p class="mt-1.5 sm:mt-2 text-xs sm:text-sm text-zinc-600 dark:text-rose-100/72">时尚品牌、神图体质</p>
      </div>
      <div class="rounded-lg border border-rose-100 dark:border-rose-900/30 bg-white dark:bg-[#211a1f] p-3 sm:p-4">
        <p class="text-[11px] sm:text-xs uppercase tracking-wide text-teal-600 dark:text-teal-300">性格氛围</p>
        <p class="mt-1.5 sm:mt-2 text-xs sm:text-sm text-zinc-600 dark:text-rose-100/72">亲近感、团队感</p>
      </div>
      <div class="rounded-lg border border-rose-100 dark:border-rose-900/30 bg-white dark:bg-[#211a1f] p-3 sm:p-4">
        <p class="text-[11px] sm:text-xs uppercase tracking-wide text-rose-500 dark:text-rose-300">偶像叙事</p>
        <p class="mt-1.5 sm:mt-2 text-xs sm:text-sm text-zinc-600 dark:text-rose-100/72">Solo 主角、经典滤镜</p>

  </section>

  <section class="max-w-6xl mx-auto px-4 mt-12" id="idols">
    <div class="flex items-center justify-between gap-3">
      <h3 class="text-lg font-semibold">24 个大女主剧本</h3>
      <a href="./quiz.html" class="text-sm font-medium text-rose-600 dark:text-rose-300">去做测试</a>
    </div>
    <div id="idol-grid" class="mt-4 grid grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-4"></div>
  </section>
</main>

<script type="module">
import { homeIdolOrder, outcomesData } from './data/idol-data.mjs';

const themeToggle = document.getElementById('theme-toggle');
const grid = document.getElementById('idol-grid');

themeToggle.addEventListener('click', () => {
  const isDark = document.documentElement.classList.toggle('dark');
  localStorage.setItem('k-idol-preference-theme', isDark ? 'dark' : 'light');
  document.querySelector('meta[name="theme-color"]').content = isDark ? '#151114' : '#fff1f4';
});

grid.innerHTML = homeIdolOrder
  .map((code) => outcomesData.outcomes.find((outcome) => outcome.code === code))
  .filter(Boolean)
  .map((outcome) => `
  <article id="${outcome.code}" class="idol-card rounded-lg border border-rose-100 dark:border-rose-900/30 bg-white dark:bg-[#211a1f] overflow-hidden shadow-sm shadow-rose-100/70 dark:shadow-none">
    <img src="${outcome.image}" alt="${outcome.cn}" class="w-full aspect-[4/5] object-contain object-center bg-rose-50 dark:bg-[#181216]" loading="lazy" decoding="async">
    <div class="p-4">
      <div class="flex flex-wrap items-baseline gap-2">
        <h4 class="font-semibold">${outcome.cn}</h4>
        <span class="text-xs text-zinc-500 dark:text-rose-100/60">${outcome.group}</span>
      </div>
      <p class="mt-2 text-xs text-zinc-500 dark:text-rose-100/58 leading-relaxed">${outcome.achievement}</p>
      <p class="mt-2 text-sm text-zinc-600 dark:text-rose-100/74 leading-relaxed">${outcome.oneLiner}</p>
      <div class="mt-3 flex flex-wrap gap-2">
        ${(outcome.tags || []).map((tag) => `<span class="px-2 py-1 rounded-full bg-rose-50 dark:bg-rose-950/40 text-xs">${tag}</span>`).join('')}
      </div>
      <p class="mt-3 text-xs text-zinc-500 dark:text-rose-100/58 leading-relaxed">${outcome.commentary}</p>
    </div>
  </article>
`).join('');
</script>
</body>
</html>
